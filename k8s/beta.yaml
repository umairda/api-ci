apiVersion: v1
kind: Namespace
metadata:
  name: health-beta
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: health-api
  namespace: health-beta
spec:
  replicas: 1
  selector:
    matchLabels:
      app: health-api
      env: beta
  template:
    metadata:
      labels:
        app: health-api
        env: beta
    spec:
      containers:
      - name: health-api
        image: REPLACE_IMAGE
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 2
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: health-api
  namespace: health-beta
spec:
  selector:
    app: health-api
    env: beta
  ports:
  - port: 80
    targetPort: 8080
