apiVersion: v1
kind: Namespace
metadata:
  name: health-prod
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: health-api
  namespace: health-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: health-api
      env: prod
  template:
    metadata:
      labels:
        app: health-api
        env: prod
    spec:
      containers:
      - name: health-api
        image: REPLACE_IMAGE
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 2
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: health-api
  namespace: health-prod
spec:
  selector:
    app: health-api
    env: prod
  ports:
  - port: 80
    targetPort: 8080
